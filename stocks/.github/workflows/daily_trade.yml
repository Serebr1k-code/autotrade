name: Daily Trade
on:
  schedule:
    - cron: '30 20 * * 1-5'  # 16:30 ET Mon-Fri
  workflow_dispatch:
jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }

      - name: Install deps
        run: pip install -q joblib lightgbm yfinance pandas numpy requests tqdm python-calamine scikit-learn

      - name: Restore cache
        uses: actions/cache@v4
        id: cache-data
        with:
          path: cache_data.joblib
          key: stock-cache-${{ hashFiles('download_all.py') }}

      - name: Download data if no cache
        if: steps.cache-data.outputs.cache-hit != 'true'
        run: python download_all.py

      - name: Run trade
        run: python trade.py
        env:
          STOCK_API_KEY: ${{ secrets.STOCK_API_KEY }}
